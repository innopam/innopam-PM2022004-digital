version: '3.9'

services:
  dt:
    build:
      context: .
      dockerfile: dockerfile
    image: building:latest
    volumes:
      - ./workspace:/workspace
      - /home/hero/change_detection:/home/hero/change_detection
      - /home/user/data:/home/user/data
    shm_size: '50gb'
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      - FORCE_COLOR=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      sh -c "python /workspace/main.py
      --input ${dataset_path:-/workspace/input}
      --output ${output_path:-/workspace/output}
      --model ${model_path:-/workspace/model}
      --result_min_area_m2 ${result_min_area_m2:-50}
      --sheet_workers ${sheet_workers:-3}
      --overwrite
      ${extra_args:-}"
